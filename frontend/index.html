<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/molecore-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css">
    <title>molecore</title>
  </head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo" style="cursor: pointer; display: flex; justify-content: center;">
          <img src="/molecore-logo-light.png" alt="molecore" style="width: 140px; height: auto;">
        </div>
   </div>

     <div id="search-container">
       <input type="text" id="search-input" placeholder="🔍 Search pages...">
       <div id="search-results"></div>
     </div>

      <div id="favorites-section">
        <div class="section-label">Favorites</div>
        <div id="favorites-list"></div>
      </div>
      <div id="pages-section">
        <div class="section-label">Pages</div>
        <div id="pages-list"></div>
      </div>

      <div class="sidebar-footer">
        <button id="new-page-btn">+ New Page</button>
        <div class="user-block">
          <div class="user-greeting" id="user-greeting">Hello Guest</div>
          <div class="user-divider"></div>
          <div class="user-actions">
            <button id="login-btn">Login</button>
            <button id="logout-btn" style="display: none;">Logout</button>
            <button id="darkmode-btn">☾</button>
            <button id="settings-btn">👤</button>
          </div>
        </div>
      </div>
    </aside>

    <div id="content">
      <div id="welcome-screen" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center;">
        <h1 style="font-size: 3rem; margin-bottom: 1rem;">Welcome to molecore</h1>
        <p style="font-size: 1.2rem; color: var(--text-secondary); margin-bottom: 2rem;">Please log in to enter your burrow</p>
      </div>

      <div id="app-content">
        <header>
          <input type="text" id="page-title" value="Untitled" placeholder="Untitled">
        </header>

        <div id="toolbar">
          <div id="breadcrumbs"></div>
          <button id="delete-btn">Delete</button>
          <button id="undo-btn" title="Undo (⌘Z)">↺</button>
          <button id="redo-btn" title="Redo (⌘⇧Z)">↻</button>
          <button id="favorite-btn" class="toolbar-action">☆</button>
        </div>
        <main>
          <div id="editor"></div>
        </main>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Profile</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Profile Section -->
        <div class="settings-section" id="profile-section">
          <h3>Profile</h3>
          <div class="profile-info">
            <div class="profile-avatar">👤</div>
            <div class="profile-details">
              <span class="profile-username" id="profile-username">User</span>
            </div>
          </div>
        </div>

        <!-- Storage Section -->
        <div class="settings-section">
          <h3>Storage</h3>
          <div class="storage-info" id="storage-info">
            <div class="storage-bar-container">
              <div class="storage-bar" id="storage-bar"></div>
            </div>
            <p class="storage-text" id="storage-text">Loading...</p>
          </div>
          <button id="cleanup-uploads-btn" class="settings-action-btn">
            🗑️ Clean Up Unused Files
          </button>
          <p class="settings-help">Remove uploaded files that are no longer used in any page.</p>
        </div>

        <!-- Logout Section -->
        <div class="settings-section">
          <button id="settings-logout-btn" class="settings-action-btn settings-logout-btn">
            Logout
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Bottom Menu -->
  <nav id="mobile-bottom-menu">
    <button id="mobile-user-btn" class="mobile-menu-btn">👤</button>
    <button id="mobile-menu-toggle" class="mobile-menu-logo">
      <img src="/molecore-logo-dark.png" alt="molecore">
    </button>
    <button id="mobile-darkmode-btn" class="mobile-menu-btn">☾</button>
  </nav>

  <!-- Mobile Slide-in Overlay -->
  <div id="mobile-overlay" class="mobile-overlay">
    <div id="mobile-slide-panel" class="mobile-slide-panel">
      <div class="mobile-panel-header">
        <h2>molecore</h2>
        <button id="mobile-close-btn" class="mobile-close-btn">&times;</button>
      </div>
      <div class="mobile-panel-content">
        <div id="mobile-favorites-section">
          <div class="section-label">Favorites</div>
          <div id="mobile-favorites-list"></div>
        </div>
        <div id="mobile-pages-section">
          <div class="section-label">Pages</div>
          <div id="mobile-pages-list"></div>
        </div>
        <button id="mobile-new-page-btn" class="mobile-new-page-btn">+ New Page</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
